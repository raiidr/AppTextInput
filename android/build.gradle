buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.8.2"
  }
}

static def isNewArchitectureEnabled(rootProject) {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"

def appProject = rootProject.allprojects.find { it.plugins.hasPlugin('com.android.application') }

if (isNewArchitectureEnabled(rootProject)) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["AppTextInput_" + name]
}

android {
  namespace "com.apptextinput"
  compileSdkVersion getExtOrDefault("compileSdkVersion") ?: 35

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion") ?: 24
    targetSdkVersion getExtOrDefault("targetSdkVersion") ?: 35
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled(rootProject).toString()
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      if (isNewArchitectureEnabled(rootProject)) {
        java.srcDirs += ["build/generated/source/codegen/java"]
      }
    }
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-native:+"
  implementation "androidx.appcompat:appcompat:1.7.0"
  implementation "com.airbnb.android:lottie:6.5.2"
}

if (isNewArchitectureEnabled(rootProject)) {
  react {
    jsRootDir = file("../src/")
    libraryName = "AppTextInput"
    codegenJavaPackageName = "com.apptextinput"
  }
}
